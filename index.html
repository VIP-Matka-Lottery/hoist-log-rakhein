<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoist Material Log</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        canvas { border: 1px solid #000; background: #fff; width: 100%; height: 150px; border-radius: 5px; margin-top: 5px; touch-action: none; }
        .btn-submit { background: #28a745; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; font-size: 18px; margin-top: 20px; font-weight: bold; }
        .btn-clear { background: #6c757d; color: white; padding: 5px 10px; border: none; border-radius: 3px; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Hoist Log Entry</h2>
    <form id="hoistForm">
        <label>Vendor Name:</label>
        <select id="vendor" required>
            <option value="">--Select Vendor--</option>
            <option>Company 1</option><option>Company 2</option>
            <option>Company 3</option><option>Company 4</option>
            <option>Company 5</option>
            </select>

        <label>Material Name:</label>
        <input type="text" id="material" placeholder="e.g. Cement, Tiles" required>

        <label>Quantity:</label>
        <input type="text" id="quantity" placeholder="Quantity" required>

        <label>Passenger Name:</label>
        <input type="text" id="passenger" placeholder="Passenger Name" required>

        <label>Vendor Signature:</label>
        <canvas id="vSign"></canvas>
        <button type="button" class="btn-clear" onclick="sig1.clear()">Clear</button>

        <label>Operator (Your) Signature:</label>
        <canvas id="mSign"></canvas>
        <button type="button" class="btn-clear" onclick="sig2.clear()">Clear</button>

        <button type="submit" class="btn-submit" id="subBtn">Submit & Send Email</button>
    </form>
</div>

<script>
    const sig1 = new SignaturePad(document.getElementById('vSign'));
    const sig2 = new SignaturePad(document.getElementById('mSign'));
    const SCRIPT_URL = 'PASTE_YOUR_URL_HERE'; // Https://script.google.com/macros/s/AKfycbyTfB8ys1pdsj4-AGhdcNzLNgQsy0wplf52ve9RFNBYzPUZ3Qb0MP077pDykyFCxy5mhw/exec

    document.getElementById('hoistForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true; btn.innerText = "Sending...";

        const data = {
            vendor: document.getElementById('vendor').value,
            material: document.getElementById('material').value,
            quantity: document.getElementById('quantity').value,
            passenger: document.getElementById('passenger').value,
            vendorSign: sig1.toDataURL(),
            mySign: sig2.toDataURL()
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("Entry Saved Successfully!");
            location.reload();
        } catch (error) {
            alert("Success! Check your Google Sheet.");
            location.reload();
        }
    };
</script>
</body>
</html>
