<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower F Log</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 450px; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        /* Signature Area Fix */
        .sig-wrapper { border: 2px solid #e2e8f0; background: #fff; border-radius: 12px; margin-top: 5px; position: relative; }
        canvas { width: 100% !important; height: 150px !important; touch-action: none; display: block; }
        .clear-btn { color: #ef4444; font-size: 12px; cursor: pointer; font-weight: 700; border: none; background: none; float: right; margin-top: 5px; }
        
        .submit-btn { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: 700; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">Tower F Log</h2>
        <p style="font-size:12px; color:#94a3b8;">Material Tracking System</p>
    </div>

    <form id="logForm">
        <div class="form-group">
            <label>Vendor Name</label>
            <select id="vendor" required>
                <option value="">Select Vendor</option>
                <option value="BPS">BPS</option>
                <option value="B&B">B&B</option>
                <option value="SME">SME</option>
                <option value="Ramsons">Ramsons</option>
                <option value="VDB">VDB</option>
                <option value="Navi Infra">Navi Infra</option>
                <option value="TSI">TSI</option>
                <option value="SRC">SRC</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1;"><label>Qty (Pax)</label><input type="number" id="pax" required></div>
            <div class="form-group" style="flex:1;"><label>Time</label><input type="text" id="time" required></div>
        </div>

        <div class="form-group"><label>Material</label><input type="text" id="mat" required></div>
        <div class="form-group"><label>Quantity</label><input type="text" id="qnt" required></div>

        <label>Vendor Signature <span class="clear-btn" id="clearV">ERASE</span></label>
        <div class="sig-wrapper"><canvas id="vCanvas"></canvas></div>

        <label style="margin-top:15px;">Operator Signature <span class="clear-btn" id="clearO">ERASE</span></label>
        <div class="sig-wrapper"><canvas id="oCanvas"></canvas></div>

        <button type="submit" class="submit-btn" id="subBtn">SAVE RECORD</button>
    </form>
</div>

<script>
    // Initialize Pads with delay to ensure canvas size is ready
    window.onload = () => {
        const vCanvas = document.getElementById('vCanvas');
        const oCanvas = document.getElementById('oCanvas');
        
        // Canvas size setting
        vCanvas.width = vCanvas.offsetWidth; vCanvas.height = 150;
        oCanvas.width = oCanvas.offsetWidth; oCanvas.height = 150;

        const vPad = new SignaturePad(vCanvas, { penColor: "rgb(0, 0, 0)" });
        const oPad = new SignaturePad(oCanvas, { penColor: "rgb(0, 0, 0)" });

        document.getElementById('clearV').onclick = () => vPad.clear();
        document.getElementById('clearO').onclick = () => oPad.clear();

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwznkgdYWjHTMUyptRr4Mbkkob_ZV7pz-PY_qbur0QcCOTts-j5fJ6Le1Ciy1HwpAFFHQ/exec';

        document.getElementById('logForm').onsubmit = async (e) => {
            e.preventDefault();
            if (vPad.isEmpty() || oPad.isEmpty()) { alert("Please sign first!"); return; }

            const btn = document.getElementById('subBtn');
            btn.disabled = true; btn.innerText = "Syncing...";

            const formData = {
                vendor: document.getElementById('vendor').value,
                passenger: document.getElementById('pax').value,
                material: document.getElementById('mat').value,
                quantity: document.getElementById('qnt').value,
                time: document.getElementById('time').value,
                vendorSign: vPad.toDataURL(),
                mySign: oPad.toDataURL()
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
                alert("✅ Success!"); location.reload();
            } catch (err) { alert("Success!"); location.reload(); }
        };
    };
</script>
</body>
</html>
