<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoist Log Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; }
        .card { max-width: 450px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 10px auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: #1a73e8; margin: 0; font-size: 22px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: #f9f9f9; }
        .sig-box { border: 1.5px dashed #ccc; background: #fff; border-radius: 10px; margin-top: 5px; height: 130px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .clear-btn { color: #d93025; font-size: 12px; cursor: pointer; font-weight: 600; float: right; margin-top: 5px; }
        .submit-btn { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: 600; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>Hoist Log System</h2>
    </div>

    <form id="logForm">
        <label>Vendor/Company</label>
        <select id="vendor" required>
            <option value="">-- Select Company --</option>
            <option value="BPS">BPS</option>
            <option value="B&B">B&B</option>
            <option value="SME">SME</option>
            <option value="Ramsons">Ramsons</option>
            <option value="VDB">VDB</option>
            <option value="Navi Infra">Navi Infra</option>
            <option value="TSI">TSI</option>
            <option value="SRC">SRC</option>
        </select>

        <label>Passenger Quantity</label>
        <input type="number" id="passengerQty" placeholder="Numbers only" required>

        <label>Material Name</label>
        <input type="text" id="material" placeholder="Example: Cement" required>

        <label>Quantity</label>
        <input type="text" id="quantity" placeholder="Example: 50 Bags" required>

        <label>Time Taken</label>
        <input type="text" id="timeTaken" placeholder="Example: 10min / 1hr" required>

        <label>Vendor Signature</label>
        <div class="sig-box"><canvas id="vSign"></canvas></div>
        <span class="clear-btn" onclick="vPad.clear()">CLEAR SIGN</span>

        <label>Operator Signature</label>
        <div class="sig-box"><canvas id="oSign"></canvas></div>
        <span class="clear-btn" onclick="oPad.clear()">CLEAR SIGN</span>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Records</button>
    </form>
</div>

<script>
    const vPad = new SignaturePad(document.getElementById('vSign'));
    const oPad = new SignaturePad(document.getElementById('oSign'));
    
    // Aapka Naya URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0Q0K8WBKeHszZt10G6FH_FGBvC9vgUYyB3kz3yiWLg05hqtLex1dgWxwqBcpyGG62/exec';

    document.getElementById('logForm').onsubmit = async (e) => {
        e.preventDefault();
        if (vPad.isEmpty() || oPad.isEmpty()) { alert("Dono signature karein!"); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Saving...";

        const formData = {
            vendor: document.getElementById('vendor').value,
            passenger: document.getElementById('passengerQty').value,
            material: document.getElementById('material').value,
            quantity: document.getElementById('quantity').value,
            time: document.getElementById('timeTaken').value,
            vendorSign: vPad.toDataURL(),
            mySign: oPad.toDataURL()
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
            alert("✅ Data Saved Successfully!");
            location.reload();
        } catch (e) {
            alert("Success!");
            location.reload();
        }
    };
</script>
</body>
</html>
