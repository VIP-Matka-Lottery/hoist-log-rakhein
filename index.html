<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower F Hoist Log</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="IMG_4783.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .app-card { max-width: 400px; background: #fff; padding: 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #1c1e21; margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 13px; color: #65676b; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f7f8fa; }
        .sig-container { border: 1px solid #ddd; background: #fff; border-radius: 12px; height: 140px; margin-top: 5px; position: relative; }
        canvas { width: 100% !important; height: 100% !important; touch-action: none; }
        .clear-btn { color: #d93025; font-size: 12px; cursor: pointer; float: right; border: none; background: none; font-weight: bold; }
        .submit-btn { background: #007bff; color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>
<div class="app-card">
    <h2>Tower F Log</h2>
    <form id="mainForm">
        <label>VENDOR</label>
        <select id="v" required>
            <option value="">Select Vendor</option>
            <option value="BPS">BPS</option>
            <option value="VDB">VDB</option>
            <option value="SME">SME</option>
            <option value="B&B">B&B</option>
            <option value="Ramsons">Ramsons</option>
        </select>
        
        <label>PASSENGER QTY</label>
        <input type="number" id="p" placeholder="0" required>
        
        <label>TIME TAKEN</label>
        <input type="text" id="t" placeholder="e.g. 20min" required>
        
        <label>MATERIAL</label>
        <input type="text" id="m" placeholder="e.g. Cement" required>
        
        <label>QUANTITY</label>
        <input type="text" id="q" placeholder="e.g. 50 Bags" required>
        
        <label>VENDOR SIGNATURE <span class="clear-btn" id="cV">ERASE</span></label>
        <div class="sig-container"><canvas id="vC"></canvas></div>
        
        <label>OPERATOR SIGNATURE <span class="clear-btn" id="cO">ERASE</span></label>
        <div class="sig-container"><canvas id="oC"></canvas></div>
        
        <button type="submit" class="submit-btn" id="sB">SAVE DATA</button>
    </form>
</div>

<script>
    const vC = document.getElementById('vC'); const oC = document.getElementById('oC');
    // Canvas size adjustment
    vC.width = vC.offsetWidth; vC.height = 140; oC.width = oC.offsetWidth; oC.height = 140;
    const vP = new SignaturePad(vC); const oP = new SignaturePad(oC);

    document.getElementById('cV').onclick = () => vP.clear();
    document.getElementById('cO').onclick = () => oP.clear();

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        if(vP.isEmpty() || oP.isEmpty()){ alert("Sign zaroori hai!"); return; }
        const btn = document.getElementById('sB'); btn.disabled = true; btn.innerText = "Saving...";
        
        const payload = {
            vendor: document.getElementById('v').value,
            passenger: document.getElementById('p').value,
            time: document.getElementById('t').value,
            material: document.getElementById('m').value,
            quantity: document.getElementById('q').value,
            vendorSign: vP.toDataURL(),
            mySign: oP.toDataURL()
        };

        const URL = 'https://script.google.com/macros/s/AKfycbwQnodDqPhejjDcVE119TiMP7_Cucvao2BWI3hGw3Ijyj4YjZB-hdwf4imrkkO7uKpbsQ/exec';
        
        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Saved!"); location.reload();
        } catch(e) { 
            alert("✅ Saved!"); location.reload(); 
        }
    };
</script>
</body>
</html>
